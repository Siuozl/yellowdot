<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#F5C518">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="YellowDot">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <title>YellowDot</title>
  <style id="dynamic-styles"></style>
</head>
<body>

<div id="progress"></div>
<div id="particles"></div>

<header>
  <div class="brand" id="brand-text"></div>
  <div class="search-wrap" id="search-wrap">
    <input type="text" id="search-input" autocomplete="off" spellcheck="false">
    <div id="search-dropdown"></div>
  </div>
  <div id="breadcrumb-wrap"></div>
</header>
<div class="header-line"></div>

<div class="corner-ornament tl" id="corner-tl"></div>
<div class="corner-ornament br" id="corner-br"></div>

<main>
  <div id="loading"></div>
  <div id="error-msg"></div>
  <div id="content"></div>
</main>

<script>
(async function () {
  let P = {};

  async function loadParams() {
    try {
      const res = await fetch('parameters.json');
      if (!res.ok) throw new Error();
      P = await res.json();
    } catch (e) {
      console.error('parameters.json failed to load, using empty defaults.');
    }
  }

  function g(section, key, fallback) {
    if (P[section] && P[section][key] !== undefined) return P[section][key];
    return fallback !== undefined ? fallback : '';
  }

  function injectStyles() {
    const c  = P.colors     || {};
    const bg = P.background || {};
    const pa = P.particles  || {};
    const h  = P.header     || {};
    const ba = P.brand_animations || {};
    const pr = P.progress_bar     || {};
    const sb = P.scrollbar        || {};
    const co = P.corner_ornaments || {};
    const ly = P.layout           || {};
    const f  = P.fonts            || {};
    const ty = P.typography       || {};
    const an = P.animations       || {};
    const lo = P.loading          || {};
    const sr = P.search           || {};
    const bc = P.breadcrumb       || {};
    const sh = P.shadows          || {};
    const gr = P.grain            || {};

    const css = `
@import url('${f.google_import || ""}');

:root {
  --gold:        ${c.gold        || "#F5C518"};
  --gold-bright: ${c.gold_bright || "#FFD700"};
  --gold-pale:   ${c.gold_pale   || "#FFF4B2"};
  --gold-dark:   ${c.gold_dark   || "#B8860B"};
  --gold-deep:   ${c.gold_deep   || "#7A5C00"};
  --ink:         ${c.ink         || "#1A1200"};
  --ink-soft:    ${c.ink_soft    || "#2E2100"};
  --cream:       ${c.cream       || "#FFFBE6"};
  --cream2:      ${c.cream2      || "#FFF7D0"};
  --glow-sm:     ${sh.glow_sm    || "0 0 8px #FFD70088, 0 0 18px #F5C51844"};
  --glow-md:     ${sh.glow_md    || "0 0 12px #FFD700AA, 0 0 30px #F5C51866, 0 0 60px #B8860B33"};
  --glow-lg:     ${sh.glow_lg    || "0 0 20px #FFD700CC, 0 0 50px #F5C51888, 0 0 100px #B8860B44"};
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: ${c.page_bg || "#0D0A00"};
  color: var(--cream);
  font-family: ${f.body_family || "'Cormorant Garamond', Georgia, serif"};
  font-size: ${f.body_size || "19px"};
  line-height: ${f.body_line_height || "1.75"};
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse ${bg.gradient_1_size_x || "80%"} ${bg.gradient_1_size_y || "60%"} at ${bg.gradient_1_pos_x || "20%"} ${bg.gradient_1_pos_y || "10%"}, ${bg.gradient_1_color || "#2A1D0088"} 0%, transparent 60%),
    radial-gradient(ellipse ${bg.gradient_2_size_x || "60%"} ${bg.gradient_2_size_y || "80%"} at ${bg.gradient_2_pos_x || "85%"} ${bg.gradient_2_pos_y || "90%"}, ${bg.gradient_2_color || "#1E1500AA"} 0%, transparent 55%),
    radial-gradient(ellipse 100% 100% at 50% 50%, ${bg.gradient_3_color_a || "#100C0066"} 0%, ${bg.gradient_3_color_b || "#0D0A00"} 100%);
  pointer-events: none;
}

${gr.enabled !== "false" ? `
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 1;
  background-image: url("${gr.svg_url || "data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='[w3.org](http://www.w3.org/2000/svg)'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E"}");
  opacity: ${gr.opacity || "0.25"};
  pointer-events: none;
  animation: grain ${gr.speed || "0.4s"} steps(1) infinite;
}
@keyframes grain {
  0%,100%{ transform: translate(0,0); }
  10%    { transform: translate(-2%, -3%); }
  20%    { transform: translate(3%, 1%); }
  30%    { transform: translate(-1%, 4%); }
  40%    { transform: translate(4%, -2%); }
  50%    { transform: translate(-3%, 3%); }
  60%    { transform: translate(2%, -4%); }
  70%    { transform: translate(-4%, 1%); }
  80%    { transform: translate(1%, 3%); }
  90%    { transform: translate(3%, -1%); }
}` : ''}

#particles {
  position: fixed; inset: 0; z-index: 2;
  pointer-events: none;
  overflow: hidden;
}
.particle {
  position: absolute;
  border-radius: 50%;
  background: ${pa.color || "#FFD700"};
  opacity: 0;
  animation: float-up linear infinite;
  box-shadow: ${pa.glow || "0 0 8px #FFD70088, 0 0 18px #F5C51844"};
}
@keyframes float-up {
  0%   { transform: translateY(100vh) scale(0); opacity: 0; }
  10%  { opacity: ${pa.opacity_peak || "0.6"}; }
  90%  { opacity: ${pa.opacity_fade || "0.3"}; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; justify-content: space-between; align-items: center;
  padding: ${h.padding_v || "18px"} ${h.padding_h || "40px"}; gap: 20px;
  backdrop-filter: blur(${h.blur || "16px"}) saturate(${h.saturate || "180%"});
  background: linear-gradient(to bottom, ${h.bg_top || "#0D0A00EE"} 0%, ${h.bg_bottom || "#0D0A00AA"} 100%);
  border-bottom: 1px solid ${h.border_color || "#FFD70022"};
}

.brand {
  font-family: ${f.display_family || "'Playfair Display', serif"};
  font-weight: 900;
  font-size: 22px;
  letter-spacing: 0.08em;
  color: var(--gold);
  text-shadow: var(--glow-md);
  text-transform: uppercase;
  animation: brand-pulse ${ba.pulse_duration || "3s"} ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes brand-pulse {
  0%,100% { text-shadow: ${ba.pulse_shadow_a || "var(--glow-md)"}; }
  50%     { text-shadow: ${ba.pulse_shadow_b || "var(--glow-lg)"}; }
}

.brand span {
  color: var(--gold-bright);
  display: inline-block;
  animation: dot-bob ${ba.dot_bob_duration || "2s"} ease-in-out infinite;
}
@keyframes dot-bob {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(${ba.dot_bob_offset || "-3px"}); }
}

.header-line {
  position: fixed; top: 61px; left: 0; right: 0; z-index: 99;
  height: 1px;
  background: linear-gradient(to right,
    transparent,
    ${h.glow_line_color_edge || "var(--gold)"} 30%,
    ${h.glow_line_color_mid  || "var(--gold-bright)"} 50%,
    ${h.glow_line_color_edge || "var(--gold)"} 70%,
    transparent
  );
  box-shadow: 0 0 8px 1px ${h.glow_line_dot_color || "var(--gold-bright)"};
  animation: line-shimmer ${h.glow_line_anim_duration || "4s"} ease-in-out infinite;
  display: ${h.glow_line_enabled === "false" ? "none" : "block"};
}
@keyframes line-shimmer {
  0%,100% { opacity: ${h.glow_line_anim_min || "0.5"}; }
  50%     { opacity: ${h.glow_line_anim_max || "1"}; box-shadow: 0 0 20px 2px ${h.glow_line_dot_color || "var(--gold-bright)"}; }
}

main {
  position: relative; z-index: 10;
  max-width: ${ly.max_width || "780px"};
  margin: 0 auto;
  padding: ${ly.padding_top || "130px"} ${ly.padding_sides || "40px"} ${ly.padding_bottom || "100px"};
}

#loading {
  text-align: center;
  padding: 80px 0;
  font-family: ${lo.font || "'DM Mono', monospace"};
  font-size: ${lo.size || "13px"};
  letter-spacing: ${lo.letter_spacing || "0.2em"};
  color: ${lo.color || "#B8860B"};
  animation: blink-text ${lo.blink_duration || "1s"} steps(1) infinite;
}
@keyframes blink-text {
  0%,100% { opacity: 1; }
  50%     { opacity: ${lo.blink_min_opacity || "0.3"}; }
}

#error-msg {
  display: none;
  text-align: center;
  padding: 80px 0;
  color: ${lo.error_color || "#FF6B3566"};
  font-family: ${lo.error_font || "'DM Mono', monospace"};
  font-size: ${lo.error_size || "13px"};
  letter-spacing: ${lo.error_letter_spacing || "0.12em"};
}

#content { opacity: 0; }
#content.loaded { animation: content-in ${an.content_in_duration || "0.8s"} ease forwards; }
@keyframes content-in {
  from { opacity: 0; transform: translateY(${an.content_in_from_y || "20px"}); }
  to   { opacity: 1; transform: translateY(0); }
}

#content > * {
  opacity: 0;
  animation: fade-slide ${an.stagger_duration || "0.55s"} ease forwards;
}
#content.loaded > *:nth-child(1)  { animation-delay: ${an.stagger_first_delay || "0.05s"}; }
#content.loaded > *:nth-child(2)  { animation-delay: calc(${an.stagger_first_delay || "0.05s"} + ${an.stagger_step || "0.07s"} * 1); }
#content.loaded > *:nth-child(3)  { animation-delay: calc(${an.stagger_first_delay || "0.05s"} + ${an.stagger_step || "0.07s"} * 2); }
#content.loaded > *:nth-child(4)  { animation-delay: calc(${an.stagger_first_delay || "0.05s"} + ${an.stagger_step || "0.07s"} * 3); }
#content.loaded > *:nth-child(5)  { animation-delay: calc(${an.stagger_first_delay || "0.05s"} + ${an.stagger_step || "0.07s"} * 4); }
#content.loaded > *:nth-child(6)  { animation-delay: calc(${an.stagger_first_delay || "0.05s"} + ${an.stagger_step || "0.07s"} * 5); }
#content.loaded > *:nth-child(7)  { animation-delay: calc(${an.stagger_first_delay || "0.05s"} + ${an.stagger_step || "0.07s"} * 6); }
#content.loaded > *:nth-child(8)  { animation-delay: calc(${an.stagger_first_delay || "0.05s"} + ${an.stagger_step || "0.07s"} * 7); }
#content.loaded > *:nth-child(9)  { animation-delay: calc(${an.stagger_first_delay || "0.05s"} + ${an.stagger_step || "0.07s"} * 8); }
#content.loaded > *:nth-child(10) { animation-delay: calc(${an.stagger_first_delay || "0.05s"} + ${an.stagger_step || "0.07s"} * 9); }
#content.loaded > *:nth-child(n+11) { animation-delay: ${an.stagger_cap_delay || "0.75s"}; }
@keyframes fade-slide {
  from { opacity: 0; transform: translateY(${an.stagger_from_y || "16px"}); }
  to   { opacity: 1; transform: translateY(0); }
}

#content h1 {
  font-family: ${ty.h1_font || "'Playfair Display', serif"};
  font-size: clamp(${ty.h1_size_min || "2.2rem"}, ${ty.h1_size_fluid || "5vw"}, ${ty.h1_size_max || "3.2rem"});
  font-weight: ${ty.h1_weight || "900"};
  font-style: ${ty.h1_style || "italic"};
  line-height: ${ty.h1_line_height || "1.15"};
  color: ${ty.h1_color || "var(--gold-bright)"};
  text-shadow: ${ty.h1_shadow || "var(--glow-md)"};
  margin: ${ty.h1_margin_top || "2rem"} 0 ${ty.h1_margin_bottom || "1.2rem"};
  letter-spacing: -0.01em;
}
#content h1::after {
  content: '';
  display: block;
  margin-top: ${ty.h1_underline_margin_top || "10px"};
  height: ${ty.h1_underline_height || "2px"};
  background: linear-gradient(to right, ${ty.h1_underline_color_a || "var(--gold-bright)"}, ${ty.h1_underline_color_b || "var(--gold-dark)"}, transparent);
  box-shadow: 0 0 10px ${ty.h1_underline_glow || "var(--gold)"};
  animation: line-shimmer ${ty.h1_underline_anim_duration || "3s"} ease-in-out infinite;
}

#content h2 {
  font-family: ${ty.h2_font || "'Playfair Display', serif"};
  font-size: clamp(${ty.h2_size_min || "1.5rem"}, ${ty.h2_size_fluid || "3vw"}, ${ty.h2_size_max || "2rem"});
  font-weight: ${ty.h2_weight || "700"};
  color: ${ty.h2_color || "var(--gold)"};
  text-shadow: ${ty.h2_shadow || "var(--glow-sm)"};
  margin: ${ty.h2_margin_top || "2.5rem"} 0 ${ty.h2_margin_bottom || "1rem"};
  letter-spacing: 0.02em;
  position: relative;
  padding-left: 20px;
}
#content h2::before {
  content: '';
  position: absolute; left: 0; top: 50%;
  transform: translateY(-50%);
  width: ${ty.h2_bar_width || "5px"}; height: ${ty.h2_bar_height || "70%"};
  background: linear-gradient(to bottom, ${ty.h2_bar_color_top || "var(--gold-bright)"}, ${ty.h2_bar_color_bot || "var(--gold-dark)"});
  box-shadow: ${ty.h2_bar_glow || "var(--glow-sm)"};
  border-radius: 3px;
}

#content h3 {
  font-family: ${ty.h3_font || "'Playfair Display', serif"};
  font-size: clamp(${ty.h3_size_min || "1.1rem"}, ${ty.h3_size_fluid || "2vw"}, ${ty.h3_size_max || "1.4rem"});
  font-weight: ${ty.h3_weight || "700"};
  font-style: ${ty.h3_style || "italic"};
  color: ${ty.h3_color || "var(--gold-pale)"};
  margin: ${ty.h3_margin_top || "2rem"} 0 ${ty.h3_margin_bottom || "0.8rem"};
}

#content h4, #content h5, #content h6 {
  font-family: ${ty.h4_font || "'DM Mono', monospace"};
  font-size: ${ty.h4_size || "0.85rem"};
  font-weight: ${ty.h4_weight || "500"};
  letter-spacing: ${ty.h4_letter_spacing || "0.18em"};
  text-transform: uppercase;
  color: ${ty.h4_color || "var(--gold-dark)"};
  margin: ${ty.h4_margin_top || "1.5rem"} 0 ${ty.h4_margin_bottom || "0.6rem"};
}

#content p {
  color: ${ty.p_color || "var(--cream2)"};
  margin-bottom: ${ty.p_margin_bottom || "1.3rem"};
  font-size: ${ty.p_size || "1.05rem"};
  font-weight: ${ty.p_weight || "300"};
}

#content strong {
  font-weight: ${ty.strong_weight || "700"};
  color: ${ty.strong_color || "var(--gold-bright)"};
  text-shadow: ${ty.strong_shadow || "0 0 12px #FFD70055"};
}
#content em { font-style: italic; color: ${ty.em_color || "var(--gold-pale)"}; }

#content hr {
  border: none;
  height: ${ty.hr_height || "1px"};
  background: linear-gradient(to right, transparent, ${ty.hr_color_edge || "var(--gold)"} 20%, ${ty.hr_color_mid || "var(--gold-bright)"} 50%, ${ty.hr_color_edge || "var(--gold)"} 80%, transparent);
  box-shadow: 0 0 8px ${ty.hr_glow || "var(--gold)"};
  margin: ${ty.hr_margin_v || "2.5rem"} 0;
  animation: line-shimmer 4s ease-in-out infinite;
}

#content blockquote {
  position: relative;
  margin: ${ty.bq_margin_v || "2rem"} 0;
  padding: ${ty.bq_padding || "1.4rem 1.8rem"};
  font-family: ${ty.bq_font || "'Playfair Display', serif"};
  font-style: ${ty.bq_style || "italic"};
  font-size: ${ty.bq_size || "1.15rem"};
  color: ${ty.bq_color || "var(--gold-pale)"};
  background: ${ty.bq_bg || "#FFD70008"};
  border: ${ty.bq_border || "1px solid #FFD70033"};
  border-left: ${ty.bq_border_left || "3px solid var(--gold-bright)"};
  border-radius: ${ty.bq_radius || "4px"};
  box-shadow: ${ty.bq_shadow || "0 0 20px #FFD70011, inset 0 0 30px #FFD70008"};
  overflow: hidden;
}
#content blockquote::before {
  content: '"';
  position: absolute; top: -10px; left: 14px;
  font-size: ${ty.bq_glyph_size || "5rem"};
  font-family: ${ty.bq_font || "'Playfair Display', serif"};
  color: ${ty.bq_glyph_color || "var(--gold-bright)"};
  opacity: ${ty.bq_glyph_opacity || "0.12"};
  line-height: 1;
  pointer-events: none;
}
#content blockquote::after {
  content: '';
  position: absolute; inset: -1px;
  border-radius: ${ty.bq_radius || "4px"};
  background: transparent;
  box-shadow: ${ty.bq_glow_default || "0 0 8px 1px #FFD70033, inset 0 0 8px 1px #FFD70011"};
  pointer-events: none;
  animation: bq-glow ${ty.bq_glow_duration || "2.5s"} ease-in-out infinite;
}
@keyframes bq-glow {
  0%,100% { box-shadow: ${ty.bq_glow_default || "0 0 8px 1px #FFD70033, inset 0 0 8px 1px #FFD70011"}; }
  50%     { box-shadow: ${ty.bq_glow_peak    || "0 0 20px 2px #FFD70066, inset 0 0 16px 2px #FFD70022"}; }
}

#content code {
  font-family: ${ty.code_font || "'DM Mono', monospace"};
  font-size: ${ty.code_size || "0.82em"};
  color: ${ty.code_color || "var(--gold-bright)"};
  background: ${ty.code_bg || "#FFD70011"};
  border: ${ty.code_border || "1px solid #FFD70033"};
  border-radius: ${ty.code_radius || "3px"};
  padding: ${ty.code_padding || "1px 6px"};
  text-shadow: ${ty.code_shadow || "0 0 8px #FFD70066"};
}

#content pre {
  position: relative;
  background: ${ty.pre_bg || "#0A0800"};
  border: ${ty.pre_border || "1px solid #FFD70033"};
  border-radius: ${ty.pre_radius || "6px"};
  padding: ${ty.pre_padding || "1.5rem"};
  margin: 1.5rem 0;
  overflow-x: auto;
  box-shadow: ${ty.pre_shadow || "0 0 24px #FFD70011, inset 0 0 30px #0D0A00"};
}
#content pre::before {
  content: '';
  position: absolute; inset: -1px;
  border-radius: ${ty.pre_radius || "6px"};
  border: 1px solid transparent;
  background: linear-gradient(135deg, ${ty.pre_border_grad_a || "#FFD70044"}, ${ty.pre_border_grad_b || "#B8860B11"}, ${ty.pre_border_grad_a || "#FFD70044"}) border-box;
  -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: destination-out;
  mask-composite: exclude;
  animation: border-spin ${ty.pre_spin_duration || "6s"} linear infinite;
  pointer-events: none;
}
@keyframes border-spin {
  from { filter: hue-rotate(0deg); }
  to   { filter: hue-rotate(${ty.pre_spin_hue_range || "30deg"}); }
}
#content pre code {
  background: none; border: none; padding: 0;
  color: ${ty.pre_code_color || "var(--gold-pale)"};
  font-size: ${ty.pre_code_size || "0.88rem"};
  line-height: ${ty.pre_code_line_height || "1.7"};
  text-shadow: none;
}

#content ul, #content ol {
  padding-left: ${ty.list_padding_left || "1.6rem"};
  margin-bottom: ${ty.list_margin_bottom || "1.3rem"};
}
#content li {
  color: ${ty.li_color || "var(--cream2)"};
  margin-bottom: ${ty.li_margin_bottom || "0.4rem"};
  font-weight: ${ty.li_weight || "300"};
  padding-left: 4px;
}
#content ul li::marker { color: ${ty.ul_marker_color || "var(--gold)"}; }
#content ol li::marker {
  color: ${ty.ol_marker_color || "var(--gold-dark)"};
  font-family: ${ty.ol_marker_font || "'DM Mono', monospace"};
  font-size: ${ty.ol_marker_size || "0.85em"};
}

#content a {
  color: ${ty.link_color || "var(--gold-bright)"};
  text-decoration: none;
  border-bottom: ${ty.link_border || "1px solid #FFD70055"};
  transition: color 0.2s, border-color 0.2s, text-shadow 0.2s;
}
#content a:hover {
  color: ${ty.link_hover_color || "#ffffff"};
  border-color: ${ty.link_hover_border || "var(--gold-bright)"};
  text-shadow: ${ty.link_hover_shadow || "var(--glow-sm)"};
}

#content table {
  width: 100%;
  border-collapse: collapse;
  margin: 1.5rem 0;
  font-size: ${ty.table_font_size || "0.95rem"};
}
#content th {
  font-family: ${ty.th_font || "'DM Mono', monospace"};
  font-size: ${ty.th_size || "0.78rem"};
  letter-spacing: ${ty.th_letter_spacing || "0.15em"};
  text-transform: uppercase;
  color: ${ty.th_color || "var(--gold)"};
  background: ${ty.th_bg || "#FFD70010"};
  padding: ${ty.th_padding || "10px 14px"};
  border: ${ty.th_border || "1px solid #FFD70033"};
  text-shadow: ${ty.th_shadow || "0 0 8px #FFD70066"};
}
#content td {
  padding: ${ty.td_padding || "9px 14px"};
  border: ${ty.td_border || "1px solid #FFD70018"};
  color: ${ty.td_color || "var(--cream2)"};
  font-weight: ${ty.td_weight || "300"};
  transition: background 0.2s;
}
#content tr:hover td { background: ${ty.tr_hover_bg || "#FFD70008"}; }

#content img {
  max-width: 100%;
  border-radius: ${ty.img_radius || "6px"};
  border: ${ty.img_border || "1px solid #FFD70033"};
  box-shadow: ${ty.img_shadow || "0 0 30px #FFD70022"};
  margin: ${ty.img_margin_v || "1rem"} 0;
  display: block;
}

#progress {

  function spawnParticles() {

    for (let i = 0; i < count; i++) {

      container.appendChild(p);

  window.addEventListener('scroll', () => {
    const el = document.getElementById('progress');
    const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100;
    el.style.width = Math.min(pct, 100) + '%';
  });

  function parseMarkdown(md) {
    md = md.replace(/^@n="[^"]*"\s*\n?/, '');
    const lines = md.split('\n');
    let html = '';
    let inUl = false, inOl = false, inCode = false, codeBuffer = '';
    let inTable = false, tableRows = [];

    function closeList() {
      if (inUl) { html += '</ul>'; inUl = false; }
      if (inOl) { html += '</ol>'; inOl = false; }
    }
    function flushTable() {
      if (!inTable || tableRows.length === 0) return;
      let t = '<table>';
      tableRows.forEach((row, i) => {
        const cells = row.split('|').filter((_, idx, arr) => idx > 0 && idx < arr.length - 1);
        if (i === 0) {
          t += '<thead><tr>' + cells.map(c => `<th>${inline(c.trim())}</th>`).join('') + '</tr></thead><tbody>';
        } else if (i === 1 && row.replace(/[\|\-\s]/g, '') === '') {
        } else {
          t += '<tr>' + cells.map(c => `<td>${inline(c.trim())}</td>`).join('') + '</tr>';
        }
      });
      t += '</tbody></table>';
      html += t;
      inTable = false; tableRows = [];
    }

    function inline(text) {
      return text
        .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/__(.+?)__/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/_(.+?)_/g, '<em>$1</em>')
        .replace(/~~(.+?)~~/g, '<del>$1</del>');
    }

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      if (line.startsWith('```')) {
        if (!inCode) {
          closeList(); flushTable();
          const lang = line.slice(3).trim();
          inCode = true; codeBuffer = '';
          html += `<pre><code class="lang-${lang}">`;
        } else {
          html += escapeHtml(codeBuffer) + '</code></pre>';
          inCode = false; codeBuffer = '';
        }
        continue;
      }
      if (inCode) { codeBuffer += line + '\n'; continue; }
      if (line.startsWith('|')) { closeList(); inTable = true; tableRows.push(line); continue; }
      else if (inTable) { flushTable(); }
      if (line.trim() === '') { closeList(); html += '<p style="margin:0;height:0.5rem"></p>'; continue; }
      if (/^[-*_]{3,}\s*$/.test(line)) { closeList(); html += '<hr>'; continue; }
      const hm = line.match(/^(#{1,6})\s+(.*)/);
      if (hm) { closeList(); const lvl = hm[1].length; html += `<h${lvl}>${inline(hm[2])}</h${lvl}>`; continue; }
      if (line.startsWith('> ')) { closeList(); html += `<blockquote>${inline(line.slice(2))}</blockquote>`; continue; }
      const ulm = line.match(/^[-*+]\s+(.*)/);
      if (ulm) {
        if (!inUl) { if (inOl) { html += '</ol>'; inOl = false; } html += '<ul>'; inUl = true; }
        html += `<li>${inline(ulm[1])}</li>`; continue;
      }
      const olm = line.match(/^\d+\.\s+(.*)/);
      if (olm) {
        if (!inOl) { if (inUl) { html += '</ul>'; inUl = false; } html += '<ol>'; inOl = true; }
        html += `<li>${inline(olm[1])}</li>`; continue;
      }
      closeList();
      html += `<p>${inline(line)}</p>`;
    }
    closeList(); flushTable();
    if (inCode) html += escapeHtml(codeBuffer) + '</code></pre>';
    return html;
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function extractName(md) {
    const m = md.match(/^@n="([^"]+)"/m);
    return m ? m[1] : null;
  }

  function findArticlePath(data, slug, path) {
    for (const entry of data) {
      if (entry.slug === slug) return [...path];
      if (entry.section) {
        const found = findArticlePath(entry.articles || [], slug, [...path, entry]);
        if (found) return found;
        const f2 = findArticlePath(entry.sections || [], slug, [...path, entry]);
        if (f2) return f2;
      }
    }
    return null;
  }

  function flattenSection(group) {
    return (group.articles || []).filter(a => a.slug);
  }

  function buildBreadcrumb(currentSlug, articleName, data) {
    const bc = P.breadcrumb || {};
    const wrap = document.getElementById('breadcrumb-wrap');
    wrap.innerHTML = '';
    if (!data || data.length === 0) {
      const span = document.createElement('span');
      span.className = 'bc-btn bc-article';
      span.textContent = articleName;
      wrap.appendChild(span);
      return;
    }
    const path = findArticlePath(data, currentSlug, []);
    let openDropdown = null;
    function closeAll() {
      wrap.querySelectorAll('.bc-dropdown').forEach(d => d.classList.remove('open'));
      openDropdown = null;
    }
    function makeSegment(group, idx) {
      const seg = document.createElement('div');
      seg.className = 'bc-segment';
      if (idx > 0) {
        const sep = document.createElement('span');
        sep.className = 'bc-sep'; sep.textContent = bc.sep_char || '›';
        seg.appendChild(sep);
      }
      const btn = document.createElement('button');
      btn.className = 'bc-btn'; btn.textContent = group.section;
      seg.appendChild(btn);
      const drop = document.createElement('div');
      drop.className = 'bc-dropdown';
      function renderDropContents(targetGroup) {
        drop.innerHTML = '';
        if (targetGroup !== group) {
          const back = document.createElement('div');
          back.className = 'bc-drop-item bc-drop-back';
          back.textContent = '‹ ' + group.section;
          back.addEventListener('mousedown', e => { e.preventDefault(); renderDropContents(group); });
          drop.appendChild(back);
          const divider = document.createElement('div');
          divider.className = 'bc-drop-sublabel';
          divider.textContent = targetGroup.section;
          drop.appendChild(divider);
        }
        for (const a of flattenSection(targetGroup)) {
          const item = document.createElement('div');
          item.className = 'bc-drop-item' + (a.slug === currentSlug ? ' bc-drop-current' : '');
          item.textContent = a.name;
          item.addEventListener('mousedown', e => { e.preventDefault(); window.location.href = '?article=' + encodeURIComponent(a.slug); });
          drop.appendChild(item);
        }
        for (const sub of (targetGroup.sections || [])) {
          const lbl = document.createElement('div');
          lbl.className = 'bc-drop-sublabel bc-drop-sublabel-clickable';
          lbl.textContent = sub.section + ' ›';
          lbl.addEventListener('mousedown', e => { e.preventDefault(); renderDropContents(sub); });
          drop.appendChild(lbl);
        }
      }
      renderDropContents(group);
      btn.addEventListener('click', e => {
        e.stopPropagation();
        if (openDropdown === drop) { closeAll(); return; }
        closeAll();
        renderDropContents(group);
        drop.classList.add('open');
        openDropdown = drop;
      });
      seg.appendChild(drop);
      return seg;
    }
    if (path) {
      path.forEach((group, idx) => { wrap.appendChild(makeSegment(group, idx)); });
      const sep = document.createElement('span');
      sep.className = 'bc-sep';
      sep.textContent = path.length > 0 ? (bc.sep_mid_char || '·') : '';
      wrap.appendChild(sep);
    }
    const artBtn = document.createElement('span');
    artBtn.className = 'bc-btn bc-article';
    artBtn.textContent = articleName;
    wrap.appendChild(artBtn);
    document.addEventListener('click', closeAll);
  }

  async function loadArticle() {
    const params = new URLSearchParams(window.location.search);
    const article = params.get('article');
    const loadEl = document.getElementById('loading');
    const errEl  = document.getElementById('error-msg');
    const content = document.getElementById('content');
    let rawArticleData = [];
    try { const r = await fetch('articles.json'); if (r.ok) rawArticleData = await r.json(); } catch(e) {}

    if (!article) { window.location.replace('?article=welcome'); return; }

    try {
      const res = await fetch(`articles/${article}.md`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const md = await res.text();
      const name = extractName(md);
      if (name) {
        const suffix = (P.brand || {}).page_title_suffix || 'YellowDot';
        document.title = `${name} — ${suffix}`;
        buildBreadcrumb(article, name, rawArticleData);
      }
      content.innerHTML = parseMarkdown(md);
      loadEl.style.display = 'none';
      content.classList.add('loaded');
    } catch(e) {
      if (article === '404') {
        loadEl.style.display = 'none';
        errEl.style.display = 'block';
        errEl.textContent = '404 — Article not found.';
      } else {
        window.location.replace('?article=404');
      }
    }
  }

  async function initSearch() {
    let rawData = [];
    try { const res = await fetch('articles.json'); if (res.ok) rawData = await res.json(); } catch(e) {}

    const sr = P.search || {};

    function flatArticles(data) {
      data = data || rawData;
      const flat = [];
      for (const entry of data) {
        if (entry.slug) { flat.push(entry); continue; }
        if (entry.section) {
          flat.push(...flatArticles(entry.articles || []));
          flat.push(...flatArticles(entry.sections || []));
        }
      }
      return flat;
    }

    function renderGroupResult(group, query, q, indent, parentSectionMatches) {
      let html = ''; let count = 0;
      const sectionMatches = parentSectionMatches || group.section.toLowerCase().includes(q);
      const directArticles = (group.articles || []).filter(a => a.slug);
      const nested = group.sections || [];
      const directToShow = sectionMatches ? directArticles : directArticles.filter(a => a.name.toLowerCase().includes(q));
      let nestedHtml = ''; let nestedCount = 0;
      for (const sub of nested) {
        const { html: sh, count: sc } = renderGroupResult(sub, query, q, indent + 1, sectionMatches);
        nestedHtml += sh; nestedCount += sc;
      }
      if (directToShow.length === 0 && nestedCount === 0) return { html: '', count: 0 };
      const labelPad = indent > 0 ? ` style="padding-left:${16 + indent * 12}px"` : '';
      const itemPad  = indent > 0 ? ` style="padding-left:${28 + indent * 12}px"` : '';
      html += `<div class="search-section-label"${labelPad}>${highlight(group.section, query)}</div>`;
      for (const a of directToShow) {
        html += `<div class="search-item search-item-indented" data-slug="${a.slug}"${itemPad}>${highlight(a.name, query)}</div>`;
        count++;
      }
      html += nestedHtml; count += nestedCount;
      return { html, count };
    }

    const input = document.getElementById('search-input');
    const dropdown = document.getElementById('search-dropdown');
    let activeIdx = -1;

    function highlight(text, query) {
      if (!query.trim()) return text;
      const idx = text.toLowerCase().indexOf(query.toLowerCase().trim());
      if (idx === -1) return text;
      return text.slice(0, idx) + '<mark>' + text.slice(idx, idx + query.trim().length) + '</mark>' + text.slice(idx + query.trim().length);
    }

    function navigate(slug) { window.location.href = '?article=' + encodeURIComponent(slug); }

    function renderDropdown(query) {
      const q = query.trim().toLowerCase();
      activeIdx = -1;
      let html = ''; let itemCount = 0;
      if (!q) {
        const topLevel = rawData.filter(e => e.slug);
        const welcome  = topLevel.filter(a => a.name.toLowerCase() === 'welcome');
        const others   = topLevel.filter(a => a.name.toLowerCase() !== 'welcome').sort((a,b) => a.name.localeCompare(b.name));
        const sections = rawData.filter(e => e.section);
        for (const a of [...welcome, ...others]) {
          html += `<div class="search-item" data-slug="${a.slug}">${a.name}</div>`;
          itemCount++;
        }
        for (const group of sections) {
          html += `<div class="search-section-label">${group.section}</div>`;
          for (const a of (group.articles || []).filter(e => e.slug)) {
            html += `<div class="search-item search-item-indented" data-slug="${a.slug}">${a.name}</div>`;
            itemCount++;
          }
          for (const sub of (group.sections || [])) {
            html += `<div class="search-section-label" style="padding-left:28px">${sub.section}</div>`;
            for (const a of (sub.articles || []).filter(e => e.slug)) {
              html += `<div class="search-item search-item-indented" data-slug="${a.slug}" style="padding-left:40px">${a.name}</div>`;
              itemCount++;
            }
          }
        }
      } else {
        const topLevel = rawData.filter(e => e.slug);
        for (const a of topLevel.filter(a => a.name.toLowerCase().includes(q))) {
          html += `<div class="search-item" data-slug="${a.slug}">${highlight(a.name, query)}</div>`;
          itemCount++;
        }
        for (const group of rawData.filter(e => e.section)) {
          const { html: gh, count: gc } = renderGroupResult(group, query, q, 0, false);
          html += gh; itemCount += gc;
        }
        if (itemCount === 0) html = '<div class="search-empty">No articles found</div>';
      }
      dropdown.innerHTML = html || '<div class="search-empty">No articles found</div>';
      dropdown.querySelectorAll('.search-item').forEach(el => {
        el.addEventListener('mousedown', e => { e.preventDefault(); navigate(el.dataset.slug); });
      });
      dropdown.classList.add('open');
    }

    input.addEventListener('focus', () => renderDropdown(input.value));
    input.addEventListener('input', () => renderDropdown(input.value));
    input.addEventListener('keydown', e => {
      const items = dropdown.querySelectorAll('.search-item');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIdx = Math.min(activeIdx + 1, items.length - 1);
        items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
        if (items[activeIdx]) items[activeIdx].scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIdx = Math.max(activeIdx - 1, -1);
        items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
      } else if (e.key === 'Enter') {
        e.preventDefault();
        const target = activeIdx >= 0 ? items[activeIdx] : items[0];
        if (target) navigate(target.dataset.slug);
      } else if (e.key === 'Escape') {
        dropdown.classList.remove('open');
        input.blur();
      }
    });
    document.addEventListener('click', e => {
      if (!document.getElementById('search-wrap').contains(e.target)) dropdown.classList.remove('open');
    });
  }

  await loadParams();
  injectStyles();
  applyBrand();
  applyCornerSVG();
  spawnParticles();
  applySearchPlaceholder();
  applyLoadingText();
  await loadArticle();
  await initSearch();

})();
// Register service worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js');
    });
  }
</script>
</body>
</html>
